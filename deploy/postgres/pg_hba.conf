# Access control for the membership-cache cluster. Order matters (first match wins; the
# final rejects are the backstop). No trust and no md5 anywhere: runtime roles reach only
# their own database over the socket by peer; migration roles only over TCP loopback by
# scram-sha-256. Install as /etc/postgresql/18/botonio/pg_hba.conf, then:
#   systemctl reload postgresql@18-botonio

# TYPE  DATABASE            USER                        ADDRESS        METHOD
# Runtime role: Unix socket, peer auth via the pg_ident map. No password.
local   botonio_staging     botonio_staging_app                        peer map=botmap
local   botonio_production  botonio_production_app                      peer map=botmap

# Migration role: TCP loopback, scram-sha-256 (password is a systemd credential).
host    botonio_staging     botonio_staging_migrate     127.0.0.1/32   scram-sha-256
host    botonio_production  botonio_production_migrate  127.0.0.1/32   scram-sha-256
host    botonio_staging     botonio_staging_migrate     ::1/128        scram-sha-256
host    botonio_production  botonio_production_migrate  ::1/128        scram-sha-256

# Local maintenance: the postgres superuser over the socket, peer.
local   all                 postgres                                   peer

# Everything else is refused.
local   all                 all                                        reject
host    all                 all                         0.0.0.0/0      reject
host    all                 all                         ::/0           reject
