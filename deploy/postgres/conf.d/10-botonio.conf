# PostgreSQL settings for the membership-cache cluster: loopback + socket only, scram, and
# no TLS (there is no non-loopback path for it to protect). Install as
# /etc/postgresql/18/botonio/conf.d/10-botonio.conf (Debian's postgresql.conf reads conf.d/),
# then: systemctl restart postgresql@18-botonio
listen_addresses = 'localhost'          # 127.0.0.1/::1 only - never '*'
port = 5432
unix_socket_directories = '/var/run/postgresql'
password_encryption = 'scram-sha-256'   # never write an md5 hash
ssl = off                               # loopback + socket only; an unused TLS stack is just surface

# Pin the display zone explicitly. initdb otherwise bakes the host's timezone into the
# generated postgresql.conf at creation, so the default would be whatever box it was made on.
# Storage is unaffected (TIMESTAMPTZ is always UTC on disk); this controls how timestamps
# display and how the server log is stamped. America/Los_Angeles is a named zone, so
# PostgreSQL applies its PST/PDT transitions itself.
timezone = 'America/Los_Angeles'
log_timezone = 'America/Los_Angeles'
