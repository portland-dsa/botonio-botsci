# Map the hyphenated OS service users to tidy PG role names (used by the `peer map=botmap`
# lines in pg_hba.conf). Install as /etc/postgresql/18/botonio/pg_ident.conf, then:
#   systemctl reload postgresql@18-botonio

# MAPNAME   SYSTEM-USERNAME                 PG-USERNAME
botmap      botonio-botsci-staging          botonio_staging_app
botmap      botonio-botsci-production       botonio_production_app
