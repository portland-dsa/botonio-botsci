# Throwaway PostgreSQL for local development and CI.
#
# This is the database the `persistence` crate's compile-time sqlx query cache
# (`.sqlx/`) is generated against, and the one its `live-db` conformance tests run
# on. It holds NO real data and is safe to wipe at any time - the data directory is
# an in-memory tmpfs, so every start is a clean cluster. It is NOT the production
# database; the production cluster is provisioned by hand with real hardening and
# credentials.
#
# Why a baked image instead of a bind-mounted init script: the repo often lives on
# a drive the podman machine does not auto-mount (e.g. a mapped drive on Windows),
# so the `botonio_app` role is COPYd into the image at build time (see Containerfile)
# rather than mounted at runtime.
#
# Usage:
#   podman compose -f deploy/test-infra/compose.yaml up -d --build
#   export DATABASE_URL=postgres://postgres@localhost:55432/botonio_dev
#   cargo sqlx prepare -p persistence                 # regenerate the committed cache
#   cargo test -p persistence --features live-db      # run the conformance suite
#   podman compose -f deploy/test-infra/compose.yaml down

services:
  postgres:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      # Throwaway/local only - NEVER production. Lets any local connection in with
      # no password, which is what makes the cache generation and tests frictionless.
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: botonio_dev
      POSTGRES_USER: postgres
      # Relocate the data directory out of the image's declared VOLUME
      # (/var/lib/postgresql). The tmpfs below then mounts cleanly onto its own path
      # instead of colliding with that volume, and it is version-independent (the PG18
      # images moved the default data dir into a major-versioned subdirectory).
      PGDATA: /pgdata
    ports:
      # Loopback-only host bind: keeps this trust-auth, throwaway database off the
      # network while preserving the local
      # sqlx-prepare / live-db workflow. Host 55432 avoids clashing with a Postgres
      # already listening on the host's 5432.
      - "127.0.0.1:55432:5432"
    tmpfs:
      # Ephemeral data: the cluster is rebuilt clean on every start, so the baked
      # init scripts (the botonio_app role) always run. Mounted at PGDATA (/pgdata above),
      # which sits outside the image's /var/lib/postgresql VOLUME so there is no
      # duplicate-mount conflict.
      - /pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d botonio_dev"]
      interval: 2s
      timeout: 3s
      retries: 30
