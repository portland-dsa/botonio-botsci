# Build once on merge to master, deploy to staging automatically, promote the SAME
# artifact to production behind a manual (required-reviewer) gate. The box has no public
# SSH; CI reaches it as a short-lived, tagged ephemeral Tailscale node and talks only to
# the shell-less per-instance deploy user - deploy-botonio-botsci-<staging|production> - whose
# login identity is itself the staging/production boundary (docs/runbooks/host-provisioning.md section 6).
#
# NOTE (supply-chain, deferred): pin every third-party action to a full commit SHA before
# relying on this pipeline (e.g. `actions/checkout@<40-hex> # v4`).
name: deploy
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Opt JS actions into Node 24 ahead of the 2026-06-16 forced cutover (checkout@v4,
# rust-cache@v2, tailscale/github-action@v2, and the artifact actions still ship
# Node 20). Drop once those actions go Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p discord-bot
      - uses: actions/upload-artifact@v4
        with:
          name: botonio-botsci-${{ github.sha }}
          path: target/release/botonio-botsci
          if-no-files-found: error

  deploy-staging:
    needs: build
    environment: staging # holds the staging Tailscale auth key + DEPLOY_HOST
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: botonio-botsci-${{ github.sha }}
          path: ./artifact
      - uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }} # ephemeral, tagged tag:ci-deploy
          tags: tag:ci-deploy
      - name: ship + restart + smoke check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}       # deploy-botonio-botsci-staging@<box-tailscale-name>
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }} # private key; its pubkey is the deploy user's forced-command key
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          # Tailscale gives network reach, not authentication - install the key the box pins.
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh=(ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new)
          # The deploy user is shell-less; its forced-command wrapper accepts only
          # upload/activate/is-active and derives the instance from the login identity
          # (this key can only ever touch staging), so no instance argument is passed.
          # Pass the artifact's sha256 so the wrapper verifies the bytes end to end.
          DIGEST="$(sha256sum artifact/botonio-botsci | cut -d' ' -f1)"
          "${ssh[@]}" "$DEPLOY_HOST" "upload $SHA $DIGEST" < artifact/botonio-botsci
          "${ssh[@]}" "$DEPLOY_HOST" "activate $SHA"
          for i in $(seq 1 30); do
            if [ "$("${ssh[@]}" "$DEPLOY_HOST" is-active)" = active ]; then echo ok; exit 0; fi
            sleep 5
          done
          echo "staging did not become active" >&2; exit 1

  deploy-production:
    needs: deploy-staging
    environment: production # required-reviewer gate; restricted to master
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: botonio-botsci-${{ github.sha }}
          path: ./artifact
      - uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci-deploy
      - name: ship + restart (same artifact)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}       # deploy-botonio-botsci-production@<box-tailscale-name>
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }} # private key; its pubkey is the deploy user's forced-command key
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh=(ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new)
          # Instance derived from the login identity (this key can only touch production).
          DIGEST="$(sha256sum artifact/botonio-botsci | cut -d' ' -f1)"
          "${ssh[@]}" "$DEPLOY_HOST" "upload $SHA $DIGEST" < artifact/botonio-botsci
          "${ssh[@]}" "$DEPLOY_HOST" "activate $SHA"
