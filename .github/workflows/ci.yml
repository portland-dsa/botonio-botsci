# Offline pull-request gate. CI is a low-trust actor: it holds NO runtime credentials and
# runs only the offline (mock) suites. Live API suites run in the local pre-push hook
# (scripts/hooks/pre-push) on the machine that holds the tokens.
#
# NOTE: the third-party actions below are pinned to
# version tags for readability. Before this pipeline is relied on (and before the public-
# repo move), pin each to a full commit SHA - e.g. `actions/checkout@<40-hex> # v4`.
#
# NOTE: `cargo fmt --check` is intentionally NOT a gate here - the workspace was never
# rustfmt'd and adopting it is a separate, deliberate cleanup. See
# project notes on rustfmt.
name: ci
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

# Opt JS actions into Node 24 ahead of the 2026-06-16 forced cutover (checkout@v4
# and gitleaks-action@v2 still ship Node 20). Drop once those actions go Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04 # matches the box's glibc; native build, no cross-compile
    # Throwaway Postgres for the sqlx cache drift check below. Holds no real data and no
    # credentials; it does not weaken CI's offline posture -
    # the clippy/test steps never touch it. Pinned to 18 to match the production major.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: botonio_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d botonio_ci"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # For gitleaks, it needs history in-tree
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: shellcheck (deploy scripts)
        # shellcheck ships on the ubuntu-24.04 runner; lint the deploy-path shell so a
        # quoting/globbing bug in the forced-command wrapper is caught mechanically.
        run: shellcheck deploy/bin/deploy-wrapper scripts/hooks/pre-push
      - name: test (offline mocks only - no credentials)
        run: cargo test --workspace
      - name: sqlx cache drift check (committed .sqlx vs live schema)
        # The offline clippy/test steps above already fail if a query changed without
        # `cargo sqlx prepare`; this additionally catches schema-type drift (a migration
        # changed a column the cached query reads). Builds sqlx-cli from crates.io (a few
        # minutes) rather than pulling a prebuilt-binary action, to keep CI's trust
        # surface to the registry it already uses.
        working-directory: crates/persistence
        env:
          DATABASE_URL: postgres://postgres@localhost:5432/botonio_ci
        run: |
          cargo install sqlx-cli --version ^0.9 --no-default-features --features rustls,postgres --locked
          psql "$DATABASE_URL" -c "CREATE ROLE botonio_app NOLOGIN;"
          cargo sqlx migrate run
          cargo sqlx prepare --check -- --features live-db --all-targets
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
